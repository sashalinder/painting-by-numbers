<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Paint by Numbers!</title>
    <!-- We are using a super fun, rounded font! -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🎨 Magic Paint by Numbers! 🖌️</h1>
            <p>Turn any picture into a fun coloring game!</p>
            <p class="author-name">By Abigail</p>
        </header>

        <main>
            <!-- Here is where we will drop our picture -->
            <section id="upload-section" class="card">
                <h2>Step 1: Pick a Picture!</h2>
                <div id="drop-zone" class="drop-zone">
                    <p>Click here or drag a picture to start!</p>
                    <input type="file" id="image-input" accept="image/*" hidden>
                </div>
            </section>

            <!-- This is the workspace where the magic happens, hidden at first -->
            <section id="workspace-section" class="card hidden">
                <h2>Step 2: Let's Paint!</h2>

                <div class="workspace-layout">
                    <!-- The big canvas where our coloring page will go -->
                    <div class="canvas-wrapper">
                        <div class="canvas-container">
                            <canvas id="paint-canvas"></canvas>
                        </div>
                        <!-- Reference image: overlays canvas top-right on desktop, fixed bottom-left on mobile -->
                        <img id="reference-image" class="reference-image hidden" alt="Original Photo" />
                    </div>

                    <!-- The color palette (desktop only, hidden on mobile) -->
                    <div class="bottom-tools">
                        <div class="palette-container">
                            <h3>Your Paint Colors</h3>
                            <div id="color-palette" class="color-palette">
                                <!-- Colors will magically appear here! -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button id="reset-button" class="btn primary-btn">Pick a New Picture</button>
                    <button id="download-button" class="btn secondary-btn">Save My Masterpiece!</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Mobile floating color palette -->
    <div id="mobile-palette-fab" class="mobile-fab hidden">
        <div class="fab-swatch-preview"></div>
        <span class="fab-label">🎨</span>
    </div>
    <div id="mobile-palette-popup" class="mobile-palette-popup hidden">
        <div class="mobile-palette-header">
            <span>Pick a Color</span>
            <button id="mobile-palette-close" class="mobile-palette-close-btn">&times;</button>
        </div>
        <div id="mobile-color-palette" class="mobile-color-grid"></div>
    </div>
    <div id="mobile-palette-overlay" class="mobile-palette-overlay hidden"></div>

    <!-- Hidden canvas to help us do the computer math -->
    <canvas id="processing-canvas" hidden></canvas>

    <!-- Adding Confetti fireworks! -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
